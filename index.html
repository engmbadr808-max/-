<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المسجد الذكية - حساب تلقائي</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <!-- استيراد مكتبة Adhan.js من مصدر خارجي -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --gold: #c5a059; --dark: #121212; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; overflow: hidden; }
        .dashboard { display: grid; grid-template-columns: 1fr 380px; height: 100vh; gap: 20px; padding: 20px; box-sizing: border-box; }
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        .adhkar-card { background: linear-gradient(45deg, #2c2c2c, #1a1a1a); border: 2px solid var(--gold); padding: 40px; border-radius: 25px; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .adhkar-card h1 { font-family: 'Amiri', serif; font-size: 3.5rem; color: var(--gold); margin: 0; }
        .prayer-times { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .prayer-box { background: #1e1e1e; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 5px solid transparent; }
        .prayer-box.active { border-bottom-color: var(--gold); background: #2a2a2a; }
        .p-name { font-size: 1.1rem; color: #aaa; }
        .p-time { font-size: 2rem; font-weight: bold; margin-top: 10px; }
        .sidebar { background: #1e1e1e; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #333; }
        .clock { font-size: 6rem; font-weight: 700; color: var(--gold); line-height: 1; }
        .date { font-size: 1.4rem; margin-top: 20px; color: #888; }
        .next-prayer { margin-top: 40px; text-align: center; background: rgba(197, 160, 89, 0.1); padding: 20px; border-radius: 15px; width: 80%; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-content">
        <div class="adhkar-card">
            <h1 id="dhikr">أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ</h1>
        </div>
        <div class="prayer-times" id="prayer-list">
            <!-- سيتم ملء المواقيت بواسطة JavaScript -->
        </div>
    </div>
    <div class="sidebar">
        <div class="clock" id="clock">00:00</div>
        <div id="seconds" style="font-size: 1.5rem; color: var(--gold);">:00</div>
        <div class="date" id="date">-- -- ----</div>
        <div class="next-prayer">
            <div style="color: #aaa;">الصلاة القادمة</div>
            <div id="next-prayer-name" style="font-size: 2rem; color: var(--gold); font-weight: bold;">--</div>
            <div id="countdown" style="font-size: 1.5rem;">00:00:00</div>
        </div>
    </div>
</div>

<script>
    // 1. إعدادات الموقع (مثال: مكة المكرمة)
    const coordinates = new adhan.Coordinates(21.4225, 39.8262); 
    const params = adhan.CalculationMethod.UmmAlQura(); // استخدام تقويم أم القرى

    function updateApp() {
        const date = new Date();
        const prayerTimes = new adhan.PrayerTimes(coordinates, date, params);

        // تنسيق الوقت
        const formatTime = (time) => time.toLocaleTimeString('ar-SA', {hour: '2-digit', minute: '2-digit', hour12: false});

        const prayers = [
            { name: "الفجر", time: prayerTimes.fajr },
            { name: "الشروق", time: prayerTimes.sunrise },
            { name: "الظهر", time: prayerTimes.dhuhr },
            { name: "العصر", time: prayerTimes.asr },
            { name: "المغرب", time: prayerTimes.maghrib },
            { name: "العشاء", time: prayerTimes.isha }
        ];

        // تحديث جدول المواقيت
        const currentPrayer = prayerTimes.currentPrayer();
        let html = '';
        prayers.forEach(p => {
            const isActive = (p.name === getPrayerArName(currentPrayer)) ? 'active' : '';
            html += `<div class="prayer-box ${isActive}">
                        <div class="p-name">${p.name}</div>
                        <div class="p-time">${formatTime(p.time)}</div>
                    </div>`;
        });
        document.getElementById('prayer-list').innerHTML = html;

        // تحديث الصلاة القادمة
        const next = prayerTimes.nextPrayer();
        const nextTime = prayerTimes.timeForPrayer(next);
        document.getElementById('next-prayer-name').innerText = getPrayerArName(next);

        // تحديث الساعة والتاريخ
        document.getElementById('clock').innerText = date.toLocaleTimeString('ar-SA', {hour: '2-digit', minute: '2-digit', hour12: false});
        document.getElementById('seconds').innerText = ":" + date.getSeconds().toString().padStart(2, '0');
        document.getElementById('date').innerText = date.toLocaleDateString('ar-SA', {weekday: 'long', day: 'numeric', month: 'long'});
    }

    function getPrayerArName(p) {
        const names = { fajr: "الفجر", sunrise: "الشروق", dhuhr: "الظهر", asr: "العصر", maghrib: "المغرب", isha: "العشاء", none: "قيام الليل" };
        return names[p] || "--";
    }

    setInterval(updateApp, 1000);
    updateApp();
</script>
</body>
</html>
