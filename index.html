<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسجد الأمير فواز</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cairo', sans-serif;
    background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
    url('https://images.unsplash.com/photo-1584551246679-0daf3d275d0f');
    background-size:cover;
    background-position:center;
    color:white;
    text-align:center;
}

h1{
    font-size:55px;
    margin-top:20px;
    color:gold;
}

#digitalClock{
    font-size:70px;
    margin-top:10px;
}

.clock{
    width:200px;
    height:200px;
    border:8px solid gold;
    border-radius:50%;
    margin:20px auto;
    position:relative;
}

.hand{
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom;
    background:white;
}

.hour{ width:6px; height:50px; }
.minute{ width:4px; height:70px; }
.second{ width:2px; height:90px; background:red;}

.prayer-times{
    margin-top:20px;
    font-size:40px;
    background:rgba(0,0,0,.6);
    padding:20px;
    border-radius:15px;
    width:80%;
    margin:auto;
}

.next-prayer{
    font-size:35px;
    color:gold;
    margin-top:15px;
}

.azkar{
    margin-top:30px;
    font-size:30px;
    background:rgba(0,0,0,.7);
    padding:20px;
    border-radius:15px;
    width:80%;
    margin:auto;
}
</style>
</head>
<body>

<h1>مسجد الأمير فواز</h1>

<div id="digitalClock"></div>

<div class="clock">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
</div>

<div class="prayer-times" id="prayerTimes">
    جاري تحميل مواقيت الصلاة...
</div>

<div class="next-prayer" id="countdown"></div>

<div class="azkar" id="azkarBox">
    جاري تحميل الأذكار...
</div>

<script>

// الساعة الرقمية والعقارب
function updateClock(){
    const now = new Date();

    document.getElementById("digitalClock").innerText =
        now.toLocaleTimeString('ar-EG');

    const hour = now.getHours() % 12;
    const minute = now.getMinutes();
    const second = now.getSeconds();

    document.getElementById("hour").style.transform =
        `translateX(-50%) rotate(${hour*30 + minute/2}deg)`;

    document.getElementById("minute").style.transform =
        `translateX(-50%) rotate(${minute*6}deg)`;

    document.getElementById("second").style.transform =
        `translateX(-50%) rotate(${second*6}deg)`;
}
setInterval(updateClock,1000);
updateClock();


// مواقيت الصلاة (جدة - السعودية)
fetch("https://api.aladhan.com/v1/timingsByCity?city=Jeddah&country=Saudi Arabia&method=4")
.then(res=>res.json())
.then(data=>{
    const t = data.data.timings;

    const prayers = {
        "الفجر":t.Fajr,
        "الظهر":t.Dhuhr,
        "العصر":t.Asr,
        "المغرب":t.Maghrib,
        "العشاء":t.Isha
    };

    let html="";
    for(let p in prayers){
        html+=`<div>${p} : ${prayers[p]}</div>`;
    }
    document.getElementById("prayerTimes").innerHTML=html;

    startCountdown(prayers);
});

// عداد الصلاة القادمة
function startCountdown(prayers){
    setInterval(()=>{
        const now=new Date();
        let nextPrayerName="";
        let nextTime=null;

        for(let name in prayers){
            const [h,m]=prayers[name].split(":");
            let prayerTime=new Date();
            prayerTime.setHours(h,m,0);

            if(prayerTime>now){
                nextPrayerName=name;
                nextTime=prayerTime;
                break;
            }
        }

        if(!nextTime){
            const [h,m]=prayers["الفجر"].split(":");
            nextTime=new Date();
            nextTime.setDate(nextTime.getDate()+1);
            nextTime.setHours(h,m,0);
            nextPrayerName="الفجر";
        }

        const diff=nextTime-now;
        const hrs=Math.floor(diff/1000/60/60);
        const mins=Math.floor((diff/1000/60)%60);
        const secs=Math.floor((diff/1000)%60);

        document.getElementById("countdown").innerText=
        `الصلاة القادمة: ${nextPrayerName} بعد ${hrs}:${mins}:${secs}`;
    },1000);
}


// الأذكار والأدعية
const azkar = [
"اللهم صل وسلم على نبينا محمد",
"سبحان الله وبحمده سبحان الله العظيم",
"اللهم اغفر لي ولوالدي وللمسلمين",
"أستغفر الله العظيم وأتوب إليه",
"اللهم اجعل هذا البلد آمناً مطمئناً",
"اللهم تقبل منا إنك أنت السميع العليم",
"اللهم ارزقنا الإخلاص في القول والعمل"
];

let index=0;
function changeZekr(){
    document.getElementById("azkarBox").innerText=azkar[index];
    index++;
    if(index>=azkar.length) index=0;
}
setInterval(changeZekr,8000);
changeZekr();

</script>

</body>
</html>
